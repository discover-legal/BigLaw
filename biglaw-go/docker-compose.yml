# BigLaw Go stack: TypeDB server → conflict-graph sidecar → Go core.
#
#   cd biglaw-go && docker compose up -d --build
#
# Reads API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY, …) from ../.env.
# REST API: http://localhost:3102  (3101 is left to the host TS backend)

name: biglaw

services:
  typedb:
    image: typedb/typedb:3.11.5
    volumes:
      - typedb-data:/var/lib/typedb/data
    restart: unless-stopped

  typedb-sidecar:
    build:
      context: ../sidecar/typedb
    environment:
      TYPEDB_URL: http://typedb:8000
      TYPEDB_USERNAME: admin
      TYPEDB_PASSWORD: password
      TYPEDB_SOCKET: /run/biglaw/typedb.sock
    volumes:
      - biglaw-sock:/run/biglaw
    depends_on:
      - typedb
    restart: unless-stopped

  biglaw:
    build:
      context: ..
      dockerfile: biglaw-go/Dockerfile
    env_file:
      - ../.env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: "3101"
      BIG_MICHAEL_MODE: backend
      RUVECTOR_DATA_DIR: /app/data
      TYPEDB_SOCKET: /run/biglaw/typedb.sock
      # State files live inside the data volume so they survive rebuilds.
      SETTINGS_FILE: /app/data/.settings.json
      TASKS_FILE: /app/data/.tasks.json
      PROFILES_FILE: /app/data/.profiles.json
      CLIENTS_FILE: /app/data/.clients.json
      TIME_FILE: /app/data/.time-entries.json
      LEARNING_FILE: /app/data/.qtable.json
      OCG_FILE: /app/data/.ocg.json
      JOBS_FILE: /app/data/.jobs.json
      AUDIT_LOG_FILE: /app/data/audit.jsonl
      DEADLINES_RULES_DIR: /app/deadlines/rules
      # Host-side inference (Ollama / LM Studio): "localhost" inside the
      # container is the container itself — route to the Docker host gateway.
      # Adjust the port here if your local endpoint differs from ../.env.
      LOCAL_INFERENCE_URL: http://host.docker.internal:11434/v1
      OLLAMA_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3102:3101"
    volumes:
      - biglaw-data:/app/data
      - biglaw-sock:/run/biglaw
    depends_on:
      - typedb-sidecar
    restart: unless-stopped

volumes:
  typedb-data:
  biglaw-data:
  biglaw-sock:
