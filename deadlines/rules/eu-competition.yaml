id: eu-competition
jurisdiction: EU-COMP
name: EU Competition Proceedings (EC Merger Regulation & Article 101/102)
version: "2024"
source: "https://ec.europa.eu/competition-policy/"
holidays: eu_institutions

rules:
  - id: eumr-phase1-response
    trigger: ec_article6_decision
    event: notification_of_concentrations_appeal_due
    days: 25
    dayType: business
    warningDays: 5
    cite: "EUMR Art. 6(3)(a)"

  - id: eumr-phase2-response
    trigger: ec_phase2_opening_decision
    event: written_submission_due
    days: 70
    dayType: calendar
    warningDays: 14
    cite: "EUMR Art. 10(3)"

  - id: ec-101-102-response
    trigger: statement_of_objections_received
    event: written_reply_due
    days: 28
    dayType: business
    warningDays: 7
    cite: "Regulation 773/2004 Art. 10(2)"

  - id: ec-dawn-raid-response
    trigger: dawn_raid_conducted
    event: information_request_response_due
    days: 10
    dayType: business
    warningDays: 2
    cite: "Regulation 1/2003 Art. 18"

  - id: gceu-annulment-action
    trigger: ec_decision_notified
    event: annulment_action_due
    days: 60
    dayType: calendar
    warningDays: 14
    cite: "TFEU Art. 263(6)"
    note: "2-month time limit from notification (extended for distance)"
