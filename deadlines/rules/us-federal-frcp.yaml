id: us-federal-frcp
jurisdiction: US-FED
name: Federal Rules of Civil Procedure
version: "2024"
source: "https://www.uscourts.gov/rules-policies/current-rules-practice-procedure"
holidays: us_federal

rules:
  - id: frcp-answer-to-complaint
    trigger: complaint_served
    event: answer_due
    days: 21
    dayType: calendar
    warningDays: 5
    cite: "FRCP 12(a)(1)(A)(i)"

  - id: frcp-answer-govt
    trigger: complaint_served_on_us_govt
    event: answer_due
    days: 60
    dayType: calendar
    warningDays: 14
    cite: "FRCP 12(a)(2)"

  - id: frcp-reply-to-answer
    trigger: answer_filed
    event: reply_due
    days: 21
    dayType: calendar
    cite: "FRCP 12(a)(1)(B)"

  - id: frcp-mtd-opposition
    trigger: motion_to_dismiss_filed
    event: opposition_due
    days: 21
    dayType: calendar
    warningDays: 5
    cite: "FRCP 12(b) + Local Rules"

  - id: frcp-msj-opposition
    trigger: summary_judgment_filed
    event: opposition_due
    days: 21
    dayType: calendar
    warningDays: 5
    cite: "FRCP 56(c)(1)"

  - id: frcp-msj-reply
    trigger: summary_judgment_opposition_filed
    event: reply_due
    days: 14
    dayType: calendar
    cite: "FRCP 56(c)(1)"

  - id: frap-notice-of-appeal
    trigger: final_judgment_entered
    event: notice_of_appeal_due
    days: 30
    dayType: calendar
    warningDays: 7
    cite: "FRAP 4(a)(1)(A)"

  - id: frap-notice-of-appeal-govt
    trigger: final_judgment_entered_govt
    event: notice_of_appeal_due
    days: 60
    dayType: calendar
    warningDays: 14
    cite: "FRAP 4(a)(1)(B)"

  - id: frcp-service-deadline
    trigger: complaint_filed
    event: service_deadline
    days: 90
    dayType: calendar
    warningDays: 14
    cite: "FRCP 4(m)"

  - id: frcp-26f-conference
    trigger: defendant_appears
    event: rule_26f_conference_due
    days: 21
    dayType: calendar
    cite: "FRCP 26(f)(1)"
