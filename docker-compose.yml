version: "3.9"

# Big Michael dev stack
#
# Included services:
#   docuseal      — self-hosted e-signature (http://localhost:3000)
#
# Optional audit services (opt-in via --profile audit):
#   opensearch    — self-hosted audit log indexer (http://localhost:9200)
#   opensearch-dashboards — visualise audit logs (http://localhost:5601)
#
# Optional conflict graph (opt-in via --profile graph):
#   typedb        — multi-hop conflict-of-interest graph (TypeDB 3.x HTTP, port 8000)
#
# Vector storage is handled by RuVector's native in-process HNSW — no Docker
# service needed. Data persists to the ./data/ directory on the host.
#
# Quick start (core only):
#   docker compose up -d
#
# Quick start (with audit backend):
#   docker compose --profile audit up -d
#   Then set AUDIT_OPENSEARCH_URL=http://localhost:9200 in .env
#
# Quick start (with conflict graph):
#   docker compose --profile graph up -d
#   Then set TYPEDB_URL=http://localhost:8000 in .env (3.x also needs TYPEDB_USERNAME/PASSWORD)

services:
  docuseal:
    image: docuseal/docuseal:latest
    container_name: big-michael-docuseal
    ports:
      - "3000:3000"
    volumes:
      - docuseal_data:/data
    environment:
      # Change this in production — used to sign session tokens
      SECRET_KEY_BASE: "changeme-use-openssl-rand-hex-64-in-production"
      # Default admin credentials for first login — change immediately
      DOCUSEAL_ADMIN_EMAIL: "admin@localhost"
      DOCUSEAL_ADMIN_PASSWORD: "admin123"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Audit backend (opt-in: docker compose --profile audit up -d) ─────────────
  # OpenSearch stores audit events in monthly indices (big-michael-audit-YYYY.MM).
  # No auth by default — suitable for local dev only. In production, enable
  # OpenSearch Security (set OPENSEARCH_SECURITY_ENABLED=true and configure users).
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: big-michael-opensearch
    profiles: [audit]
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: big-michael-opensearch-dashboards
    profiles: [audit]
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    restart: unless-stopped

  # ── Conflict graph (opt-in: docker compose --profile graph up -d) ─────────────
  # TypeDB 3.x stores the multi-hop conflict-of-interest graph. Recursive
  # FUNCTIONS detect conflicts flat substring matching cannot: if we act for a
  # company several hops up a corporate-control tree from a proposed adversary,
  # TypeDB infers the conflict (see sidecar/typedb/schema.tql). 3.x serves an
  # HTTP API on :8000 and requires credentials (default admin/password — local
  # dev only). No healthcheck: the minimal 3.x image ships no curl/CLI, and the
  # sidecar already retries the connection on every call.
  typedb:
    image: typedb/typedb:3.11.5
    container_name: big-michael-typedb
    profiles: [graph]
    ports:
      - "8000:8000"
      - "1729:1729"
    volumes:
      - typedb_data:/var/lib/typedb/data
    restart: unless-stopped

volumes:
  docuseal_data:
  opensearch_data:
  typedb_data:
